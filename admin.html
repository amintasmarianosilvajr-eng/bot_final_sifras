<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER ADMIN - Fluxo Alfa</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #00c8ff; --danger: #ff4444; --bg: #050505; --card: #0f0f0f; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: var(--bg); color: white; font-family: 'Outfit', sans-serif; padding: 40px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; border-bottom: 1px solid #222; padding-bottom: 20px; }
        h1 { font-family: 'Orbitron', sans-serif; color: var(--primary); letter-spacing: 4px; font-size: 1.5rem; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #1a1a1a; position: relative; overflow: hidden; }
        .stat-card::after { content: ''; position: absolute; left: 0; top: 0; width: 4px; height: 100%; background: var(--primary); }
        .stat-label { font-family: 'Orbitron', sans-serif; font-size: 0.7rem; color: #555; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
        .stat-val { font-size: 2rem; font-weight: 900; color: #fff; }

        .user-table-container { background: var(--card); border-radius: 24px; border: 1px solid #1a1a1a; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #151515; padding: 20px; font-family: 'Orbitron', sans-serif; font-size: 0.75rem; color: var(--primary); letter-spacing: 1px; }
        td { padding: 20px; border-bottom: 1px solid #151515; font-size: 0.9rem; }
        tr:hover { background: rgba(255,255,255,0.02); }

        .badge { padding: 6px 12px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; font-family: 'Orbitron'; }
        .badge-active { background: rgba(0, 255, 136, 0.1); color: #00ff88; border: 1px solid rgba(0, 255, 136, 0.2); }
        .badge-idle { background: rgba(255, 255, 255, 0.05); color: #555; border: 1px solid rgba(255,255,255,0.1); }
        
        .btn-reset { background: rgba(255, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(255, 68, 68, 0.3); padding: 8px 15px; border-radius: 8px; cursor: pointer; font-family: 'Orbitron'; font-size: 0.65rem; transition: 0.3s; font-weight: bold; }
        .btn-reset:hover { background: var(--danger); color: black; box-shadow: 0 0 20px rgba(255, 68, 68, 0.4); }
        
        .refresh-indicator { font-size: 0.7rem; color: #333; display: flex; align-items: center; gap: 8px; }
        .dot { width: 6px; height: 6px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 10px var(--primary); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="header">
        <h1>FLUXO ALFA POWER ADMIN</h1>
        <div class="refresh-indicator"><div class="dot"></div> LIVE ENGINE MONITORING</div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">Total de Clientes</div>
            <div class="stat-val" id="totalUsers">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Bots em Operação</div>
            <div class="stat-val" id="activeUsers">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Lucro Médio Global</div>
            <div class="stat-val" id="avgProfit">0.00%</div>
        </div>
    </div>

    <div class="user-table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 50px;">ID</th>
                    <th>NOME / USUÁRIO</th>
                    <th>SENHA</th>
                    <th>STATUS</th>
                    <th>SALDO (USDT)</th>
                    <th>LUCRO</th>
                    <th>APROVAÇÃO</th>
                    <th style="width: 320px;">AÇÕES</th>
                </tr>
            </thead>
            <tbody id="userList">
                <!-- Preenchido via JS -->
            </tbody>
        </table>
    </div>

    <script>
        let lastData = { users: [] };
        async function fetchAdminData() {
            try {
                const res = await fetch('/api/admin/data');
                const data = await res.json();
                if (!data.ok) return window.location.href = '/';
                lastData = data;

                document.getElementById('totalUsers').innerText = data.users.length;
                document.getElementById('activeUsers').innerText = data.users.filter(u => u.status !== 'IDLE').length;
                
                const totalProfit = data.users.reduce((sum, u) => sum + (u.totalProfit || 0), 0);
                document.getElementById('avgProfit').innerText = (totalProfit / (data.users.length || 1)).toFixed(2) + '%';

                const list = document.getElementById('userList');
                list.innerHTML = data.users.map(u => {
                    const isApproved = u.isApproved || u.id === 1;
                    return `
                    <tr style="opacity: ${isApproved ? '1' : '0.6'}; border-left: 3px solid ${isApproved ? 'transparent' : 'var(--cyber-gold)'}">
                        <td>#${u.id}</td>
                        <td>
                            <strong style="color:#fff">${u.clientName || 'Novo Cliente'}</strong><br>
                            <small style="color:#666">${u.user}</small>
                        </td>
                        <td>${u.password}</td>
                        <td><span class="badge ${u.status === 'IN_TRADE' ? 'badge-trade' : 'badge-idle'}">${u.status}</span></td>
                        <td style="color:#00f2ff; font-weight:bold">$${(u.balanceUSDT || 0).toFixed(2)}</td>
                        <td style="color: ${u.totalProfit >= 0 ? '#0b9' : '#f33'}">${(u.totalProfit || 0).toFixed(2)}%</td>
                        <td>${isApproved ? '✅ Aprovado' : '<span style="color:var(--cyber-gold); font-weight:900;">⏳ PENDENTE</span>'}</td>
                        <td class="user-actions">
                            ${!isApproved ? `<button class="btn btn-reset" style="background:#0b9; color:#000;" onclick="approveUser(${u.id})">APROVAR</button>` : ''}
                            <button class="btn btn-reset" onclick="recoverTrade(${u.id})">RECUPERAR</button>
                            <button class="btn btn-reset" onclick="downloadRegPDF(${u.id})" style="background:#222; border-color:#00f2ff; color:#00f2ff;">📄 CAD</button>
                            <button class="btn btn-reset" onclick="downloadHistPDF(${u.id})" style="background:#222; border-color:#00ff9d; color:#00ff9d;">📈 HIST</button>
                            <button class="btn btn-reset" style="background:rgba(255,0,0,0.1); border-color:red; color:red;" onclick="deleteUser(${u.id})">EXCLUIR</button>
                        </td>
                    </tr>
                `}).join('');
            } catch (err) { console.error("Admin Fetch Error"); }
        }

        async function approveUser(id) {
            if(!confirm(`Deseja aprovar o acesso do cliente #${id}?`)) return;
            const res = await fetch('/api/admin/approve', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ clientId: id }) });
            if((await res.json()).ok) fetchAdminData();
        }

        async function deleteUser(id) {
            if(id === 1) return alert("Impossível excluir Admin Master.");
            if(!confirm(`⚠️ ATENÇÃO: Deseja excluir permanentemente o cliente #${id}?\nEsta ação é irreversível!`)) return;
            const res = await fetch('/api/admin/delete', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ clientId: id }) });
            if((await res.json()).ok) fetchAdminData();
        }

        async function downloadRegPDF(id) {
            const u = lastData.users.find(x => x.id === id);
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(22); doc.text("FICHA DE CADASTRO - FLUXO ALFA", 20, 20);
            doc.setFontSize(12); doc.text(`Cliente ID: ${u.id}`, 20, 40);
            doc.text(`Nome: ${u.clientName || '---'}`, 20, 50);
            doc.text(`Usuário: ${u.user}`, 20, 60);
            doc.text(`Senha: ${u.password}`, 20, 70);
            doc.text(`Status: ${u.isApproved ? 'Aprovado' : 'Aguardando'}`, 20, 80);
            doc.text(`Data de Emissão: ${new Date().toLocaleString()}`, 20, 90);
            doc.save(`cadastro_alfa_${u.id}.pdf`);
        }

        async function downloadHistPDF(id) {
            const u = lastData.users.find(x => x.id === id);
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(18); doc.text(`HISTÓRICO OPERACIONAL - ${u.clientName || u.user}`, 20, 20);
            doc.setFontSize(10);
            let y = 40;
            doc.text(`LUCRO ACUMULADO: ${u.totalProfit.toFixed(2)}%`, 20, 30);
            doc.text("DATA | PAR | TIPO | LUCRO (%)", 20, y);
            y += 10;
            u.history.forEach(h => {
                if(y > 280) { doc.addPage(); y = 20; }
                doc.text(`${h.date} | ${h.symbol} | ${h.result} | ${h.profit.toFixed(3)}%`, 20, y);
                y += 7;
            });
            doc.save(`historico_alfa_${u.id}.pdf`);
        }

        async function recoverTrade(id) {
            const symbol = prompt("Digite o Ativo para recuperar (Ex: DEGOUSDT):");
            const price = prompt("Digite o Preço de Compra (Ex: 0.341):");
            if(!symbol || !price) return;
            
            if(confirm(`Confirmar monitoramento de ${symbol} @ $${price} para ID ${id}?`)) {
                const res = await fetch('/api/admin/manual-trade', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ clientId: id, symbol: symbol.toUpperCase(), price: parseFloat(price) })
                });
                const data = await res.json();
                if(data.ok) { alert("Modo Recuperação Ativo!"); fetchAdminData(); }
            }
        }

        async function resetVirgin(id) {
            if (!confirm(`Deseja aplicar o RESET VIRGEM no cliente #${id}?\nIsso limpará histórico e logs, mantendo as configurações ideais.`)) return;
            
            const res = await fetch('/api/admin/reset', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ clientId: id })
            });
            const data = await res.json();
            if (data.ok) fetchAdminData();
        }

        // Live Update
        fetchAdminData();
        setInterval(fetchAdminData, 3000);
    </script>
</body>
</html>
