<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLUXO ALFA - Portal de Acesso</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00c8ff;
            --secondary: #0088cc;
            --bg-dark: #0a0a0a;
            --glass: rgba(20, 20, 20, 0.85);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            color: white;
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }
        /* Efeito de Partículas Simulado */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.1;
        }
        .container { position: relative; z-index: 10; width: 100%; max-width: 450px; padding: 20px; }
        .logo-area { text-align: center; margin-bottom: 40px; }
        .logo-title { font-family: 'Orbitron', sans-serif; font-size: 2.5rem; color: var(--primary); text-shadow: 0 0 20px rgba(0, 200, 255, 0.5); letter-spacing: 5px; margin-bottom: 5px; }
        .card { background: var(--glass); border: 1px solid rgba(0, 200, 255, 0.2); border-radius: 24px; padding: 40px; backdrop-filter: blur(20px); box-shadow: 0 20px 50px rgba(0,0,0,0.8); position: relative; overflow: hidden; }
        .card::after { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, var(--primary), transparent); animation: sweep 3s infinite; }
        @keyframes sweep { 0% { left: -100%; } 100% { left: 100%; } }
        .tabs { display: flex; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .tab { flex: 1; text-align: center; padding: 15px; cursor: pointer; font-family: 'Orbitron', sans-serif; font-size: 0.75rem; color: #555; transition: 0.3s; letter-spacing: 2px; }
        .tab.active { color: var(--primary); border-bottom: 2px solid var(--primary); text-shadow: 0 0 10px rgba(0, 200, 255, 0.5); }
        .input-group { margin-bottom: 25px; }
        .input-group label { display: block; font-size: 0.7rem; color: var(--primary); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: bold; }
        .input-group input { width: 100%; background: rgba(0,0,0,0.6); border: 1px solid rgba(0, 200, 255, 0.1); padding: 14px; border-radius: 12px; color: white; outline: none; transition: 0.3s; font-family: 'Orbitron', sans-serif; letter-spacing: 1px; }
        .input-group input:focus { border-color: var(--primary); box-shadow: 0 0 20px rgba(0, 200, 255, 0.15); background: rgba(0,0,0,0.8); }
        .btn { width: 100%; padding: 18px; background: linear-gradient(90deg, var(--primary), var(--secondary)); border: none; border-radius: 12px; color: #000; font-weight: 900; font-family: 'Orbitron', sans-serif; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 3px; font-size: 0.9rem; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0, 200, 255, 0.4); filter: brightness(1.1); }
        #msg { text-align: center; margin-top: 20px; font-size: 0.85rem; min-height: 20px; font-weight: 500; }
        .footer-note { text-align: center; margin-top: 30px; color: #444; font-size: 0.7rem; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-area">
            <h1 class="logo-title">FLUXO ALFA</h1>
            <p style="color: #444; letter-spacing: 4px; font-size: 0.75rem; font-family: 'Orbitron';">Sifras Invest v8.6</p>
        </div>
        <div class="card">
            <div class="tabs">
                <div id="tab-login" class="tab active" onclick="switchTab('login')">ENTRAR</div>
                <div id="tab-register" class="tab" onclick="switchTab('register')">REGISTRAR</div>
            </div>
            <form id="authForm">
                <div class="input-group">
                    <label>E-mail ou Usuário</label>
                    <input type="text" id="username" placeholder="Seu acesso..." required autocomplete="username">
                </div>
                <div class="input-group">
                    <label>Senha de Segurança</label>
                    <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn" id="submitBtn">ACESSAR PAINEL</button>
            </form>
            <div id="msg"></div>
        </div>
        <div class="footer-note">SISTEMA MONITORADO POR IA - FILTRAGEM ALFA ATIVA</div>
    </div>
    <script>
        let mode = 'login';
        function switchTab(newMode) {
            mode = newMode;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + newMode).classList.add('active');
            document.getElementById('submitBtn').innerText = mode === 'login' ? 'ACESSAR PAINEL' : 'CRIAR ACESSO';
            document.getElementById('msg').innerText = '';
        }
        document.getElementById('authForm').onsubmit = async (e) => {
            e.preventDefault();
            if (mode === 'register') {
                const usernameInput = document.getElementById('username').value.trim();
                if (!usernameInput.toLowerCase().endsWith('@gmail.com')) {
                    alert("ERRO: Apenas e-mails @gmail.com são permitidos para o cadastro.");
                    return;
                }
            }
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const msg = document.getElementById('msg');
            msg.style.color = '#888';
            msg.innerText = "VALIDANDO CREDENCIAIS...";
            
            try {
                const res = await fetch(`/api/${mode}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user, pass })
                });
                const data = await res.json();
                if (data.ok) {
                    msg.style.color = '#00ff88';
                    msg.innerText = mode === 'login' ? "SINCROIZAÇÃO CONCLUÍDA! REDIRECIONANDO..." : "REGISTRO ALFA CONCLUÍDO!";
                    if (mode === 'login') {
                        localStorage.setItem('fluxo_clientId', data.clientId);
                        if (data.masterKey) localStorage.setItem('fluxo_masterKey', data.masterKey);
                        setTimeout(() => window.location.href = data.redirect, 1200);
                    } else {
                        setTimeout(() => switchTab('login'), 1500);
                    }
                } else {
                    msg.style.color = '#ff4444';
                    msg.innerText = data.msg || "ERRO NA AUTENTICAÇÃO";
                }
            } catch (err) { msg.innerText = "ERRO DE CONEXÃO COM O SERVIDOR"; }
        };
    </script>
</body>
</html>
