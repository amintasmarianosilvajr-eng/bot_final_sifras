<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLUXO ALFA - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 50%, #0a0a0a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Outfit', sans-serif;
            position: relative;
            overflow: hidden;
        }

        /* Efeito de fundo animado */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(0, 200, 255, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 70% 50%, rgba(0, 200, 255, 0.02) 0%, transparent 50%);
            animation: pulse 8s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: translate(0, 0);
                opacity: 0.5;
            }

            50% {
                transform: translate(-10%, -10%);
                opacity: 0.8;
            }
        }

        .login-container {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        .header-text {
            margin-bottom: 3rem;
        }

        .title-main {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            color: #00c8ff;
            text-shadow: 0 0 40px rgba(0, 200, 255, 0.8),
                0 0 80px rgba(0, 200, 255, 0.6),
                0 0 120px rgba(0, 200, 255, 0.4);
            letter-spacing: 8px;
            margin-bottom: 1rem;
            animation: glow 3s ease-in-out infinite;
        }

        @keyframes glow {

            0%,
            100% {
                text-shadow: 0 0 40px rgba(0, 200, 255, 0.8),
                    0 0 80px rgba(0, 200, 255, 0.6),
                    0 0 120px rgba(0, 200, 255, 0.4);
            }

            50% {
                text-shadow: 0 0 60px rgba(0, 200, 255, 1),
                    0 0 100px rgba(0, 200, 255, 0.8),
                    0 0 140px rgba(0, 200, 255, 0.6);
            }
        }

        .subtitle {
            font-family: 'Outfit', sans-serif;
            font-size: 1.2rem;
            font-weight: 300;
            color: #00c8ff;
            text-shadow: 0 0 20px rgba(0, 200, 255, 0.6);
            letter-spacing: 3px;
            opacity: 0.9;
        }

        .login-box {
            background: rgba(20, 20, 20, 0.85);
            border: 2px solid rgba(0, 200, 255, 0.3);
            border-radius: 24px;
            padding: 3rem 4rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 60px rgba(0, 200, 255, 0.2),
                inset 0 0 40px rgba(0, 200, 255, 0.05);
            min-width: 450px;
            position: relative;
        }

        .login-box::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg,
                    transparent 0%,
                    rgba(0, 200, 255, 0.1) 50%,
                    transparent 100%);
            border-radius: 24px;
            z-index: -1;
            animation: borderGlow 3s linear infinite;
        }

        @keyframes borderGlow {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .login-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: #00c8ff;
            margin-bottom: 2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .input-group {
            margin-bottom: 2rem;
        }

        .input-label {
            display: block;
            font-size: 0.85rem;
            color: #00c8ff;
            margin-bottom: 0.8rem;
            text-align: left;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .input-field {
            width: 100%;
            padding: 1rem 1.5rem;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(0, 200, 255, 0.3);
            border-radius: 12px;
            color: #00c8ff;
            font-size: 1.1rem;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
            outline: none;
            transition: all 0.3s ease;
            text-align: center;
        }

        .input-field:focus {
            border-color: #00c8ff;
            box-shadow: 0 0 20px rgba(0, 200, 255, 0.4),
                inset 0 0 10px rgba(0, 200, 255, 0.1);
            background: rgba(0, 0, 0, 0.7);
        }

        .input-field::placeholder {
            color: rgba(0, 200, 255, 0.3);
            letter-spacing: 1px;
        }

        .btn-login {
            width: 100%;
            padding: 1.2rem;
            background: linear-gradient(135deg, #00c8ff 0%, #0088cc 100%);
            border: none;
            border-radius: 12px;
            color: #000;
            font-size: 1.1rem;
            font-weight: 900;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            box-shadow: 0 0 30px rgba(0, 200, 255, 0.5);
            position: relative;
            overflow: hidden;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .btn-login:hover::before {
            left: 100%;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 50px rgba(0, 200, 255, 0.8);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .error-message {
            color: #ff4444;
            font-size: 0.9rem;
            margin-top: 1rem;
            display: none;
            text-shadow: 0 0 10px rgba(255, 68, 68, 0.5);
            animation: shake 0.5s ease;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-10px);
            }

            75% {
                transform: translateX(10px);
            }
        }

        .error-message.show {
            display: block;
        }

        /* Partículas de fundo */
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #00c8ff;
            border-radius: 50%;
            opacity: 0.3;
            animation: float 10s infinite ease-in-out;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) translateX(0);
            }

            50% {
                transform: translateY(-100px) translateX(50px);
            }
        }
    </style>
</head>

<body>
    <!-- Partículas decorativas -->
    <div class="particle" style="top: 10%; left: 20%; animation-delay: 0s;"></div>
    <div class="particle" style="top: 30%; left: 80%; animation-delay: 2s;"></div>
    <div class="particle" style="top: 60%; left: 10%; animation-delay: 4s;"></div>
    <div class="particle" style="top: 80%; left: 70%; animation-delay: 6s;"></div>
    <div class="particle" style="top: 20%; left: 50%; animation-delay: 1s;"></div>
    <div class="particle" style="top: 70%; left: 40%; animation-delay: 3s;"></div>

    <div class="login-container">
        <div class="header-text">
            <div class="title-main">SIFRAS INVEST - FLUXO ALFA</div>
            <div class="subtitle">POWER COPY TRADE</div>
        </div>

        <div class="login-box">
            <div class="login-title">Acesso Restrito</div>

            <form id="loginForm" onsubmit="return handleLogin(event)">
                <div class="input-group">
                    <label class="input-label">Senha de Acesso</label>
                    <input type="password" id="passwordInput" class="input-field" placeholder="••••••••"
                        autocomplete="off" required>
                </div>

                <button type="submit" class="btn-login">
                    Acessar Sistema
                </button>

                <div id="errorMessage" class="error-message">
                    ⚠️ Senha incorreta. Acesso negado.
                </div>
            </form>
        </div>
    </div>

    <script>
        const CORRECT_PASSWORD = 'alfa777';

        function handleLogin(event) {
            event.preventDefault();

            const passwordInput = document.getElementById('passwordInput');
            const errorMessage = document.getElementById('errorMessage');
            const enteredPassword = passwordInput.value;

            if (enteredPassword === CORRECT_PASSWORD) {
                // Senha correta - redireciona para o dashboard
                window.location.href = 'dashboard.html';
            } else {
                // Senha incorreta - mostra erro
                errorMessage.classList.add('show');
                passwordInput.value = '';
                passwordInput.focus();

                // Remove a mensagem de erro após 3 segundos
                setTimeout(() => {
                    errorMessage.classList.remove('show');
                }, 3000);
            }

            return false;
        }

        // Foco automático no campo de senha ao carregar
        window.addEventListener('load', () => {
            document.getElementById('passwordInput').focus();
        });

        // Permite Enter para submeter
        document.getElementById('passwordInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleLogin(e);
            }
        });
    </script>
</body>

</html>
